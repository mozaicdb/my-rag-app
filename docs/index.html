<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MozaicTeck RAG Chatbot</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #080808;
      color: #f0f0f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .chat-container {
      width: 100%;
      max-width: 800px;
      height: 90vh;
      display: flex;
      flex-direction: column;
      background: #111;
      border-radius: 16px;
      border: 1px solid #1f1f1f;
      overflow: hidden;
    }

    .chat-header {
      padding: 20px 24px;
      background: #111;
      border-bottom: 1px solid #1f1f1f;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #00e676;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(0,230,118,0.4); }
      50% { box-shadow: 0 0 0 8px rgba(0,230,118,0); }
    }

    .header-title {
      font-size: 16px;
      font-weight: 600;
      color: #f0f0f0;
    }

    .header-subtitle {
      font-size: 12px;
      color: #555;
      margin-left: auto;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 75%;
      padding: 14px 18px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.7;
    }

    .message.user {
      background: #ff6b00;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .message.bot {
      background: #1a1a1a;
      color: #e0e0e0;
      align-self: flex-start;
      border: 1px solid #2a2a2a;
      border-bottom-left-radius: 4px;
    }

    .message.thinking {
      background: #1a1a1a;
      color: #555;
      align-self: flex-start;
      border: 1px solid #2a2a2a;
      font-style: italic;
    }

    .chat-input-area {
      padding: 16px 24px;
      background: #111;
      border-top: 1px solid #1f1f1f;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .chat-input {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 14px 18px;
      color: #f0f0f0;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      outline: none;
      resize: none;
      height: 50px;
      transition: border 0.2s;
    }

    .chat-input:focus {
      border-color: #ff6b00;
    }

    .send-btn {
      background: #ff6b00;
      border: none;
      border-radius: 10px;
      width: 50px;
      height: 50px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    .send-btn:hover { background: #e55a00; }
    .send-btn:disabled { background: #333; cursor: not-allowed; }

    .send-btn svg {
      width: 20px;
      height: 20px;
      fill: #fff;
    }

    .welcome-message {
      text-align: center;
      color: #555;
      font-size: 13px;
      margin: auto;
      line-height: 1.8;
    }

    .welcome-message span {
      color: #ff6b00;
      font-weight: 600;
    }

    /* SCROLLBAR */
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 4px; }

    /* MOBILE */
    @media(max-width: 600px) {
      .chat-container { height: 95vh; border-radius: 12px; }
      .message { max-width: 90%; }
      .header-subtitle { display: none; }
    }
  </style>
</head>
<body>

  <div class="chat-container">

    <div class="chat-header">
      <div class="header-dot"></div>
      <div class="header-title">MozaicTeck RAG Chatbot</div>
      <div class="header-subtitle">Powered by Moses Iluyemi</div>
    </div>

    <div class="chat-messages" id="chatMessages">
      <div class="welcome-message">
        <span>MozaicTeck RAG Chatbot</span> is ready 🚀<br>
        Ask me anything about AI prompts and writing techniques. <br>
        <small style="color:#333;margin-top:8px;display:block">Powered by Moses Iluyemi</small>
      </div>
    </div>

    <div class="chat-input-area">
      <textarea 
        class="chat-input" 
        id="userInput" 
        placeholder="Ask a question from your documents..."
        rows="1"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/>
        </svg>
      </button>
    </div>

  </div>

  <script>
    const API_URL = "https://Mozaicteck-mozaicteck-rag.hf.space/ask";

    async function sendMessage() {
      const input = document.getElementById('userInput');
      const question = input.value.trim();

      // Form validation
      if (!question) return;

      // Show user message
      addMessage(question, 'user');
      input.value = '';

      // Disable button while waiting
      const btn = document.getElementById('sendBtn');
      btn.disabled = true;

      // Show thinking indicator
      const thinkingId = 'thinking-' + Date.now();
      addMessage('Searching your documents...', 'thinking', thinkingId);

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question: question })
        });

        const data = await response.json();

        // Remove thinking indicator
        document.getElementById(thinkingId)?.remove();

        // Show bot answer
        addMessage(data.answer, 'bot');

      } catch (error) {
        document.getElementById(thinkingId)?.remove();
        addMessage('Something went wrong. Please try again.', 'bot');
      }

      btn.disabled = false;
    }

    function addMessage(text, type, id = null) {
      const messages = document.getElementById('chatMessages');
      
      // Remove welcome message if exists
      const welcome = messages.querySelector('.welcome-message');
      if (welcome) welcome.remove();

      const div = document.createElement('div');
      div.className = `message ${type}`;
      div.textContent = text;
      if (id) div.id = id;

      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    // Allow Enter key to send
    document.getElementById('userInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  </script>

</body>
</html>
